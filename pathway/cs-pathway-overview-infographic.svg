<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="920" viewBox="0 0 680 920" role="img" aria-labelledby="title desc">
  <title id="title">Computer Science Pathway Overview</title>
  <desc id="desc">Foundation CS1 and CS2; AP CSP branching to AP CSA and AP Cybersecurity; both feed the centered capstone Artificial Intelligence Foundations.</desc>

  <defs>
    <marker id="m-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path fill="#64748b" d="M0,0 L0,6 L9,3 z"/>
    </marker>
    <marker id="m-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path fill="#2563eb" d="M0,0 L0,6 L9,3 z"/>
    </marker>
    <marker id="m-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path fill="#0d9488" d="M0,0 L0,6 L9,3 z"/>
    </marker>
  </defs>

  <rect width="680" height="920" fill="#ffffff"/>

  <text x="340" y="48" text-anchor="middle" fill="#0f2744" font-family="Georgia, Times New Roman, serif" font-size="28" font-weight="700">Computer Science Pathway Overview</text>
  <line x1="72" y1="64" x2="608" y2="64" stroke="#e2e8f0" stroke-width="1"/>

  <text x="340" y="98" text-anchor="middle" fill="#0d9488" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="0.06em">Common Foundation</text>

  <rect x="50" y="110" width="580" height="72" rx="8" ry="8" fill="#fafbfc" stroke="#1e3a5f" stroke-width="2"/>
  <text text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif">
    <tspan x="340" y="132" font-size="14" font-weight="600">Computer Science 1</tspan>
    <tspan x="340" y="154" font-size="11" font-weight="400" fill="#475569">Full-Stack Web and AI</tspan>
    <tspan x="340" y="168" font-size="11" font-weight="400" fill="#475569">Application Development</tspan>
  </text>

  <line x1="340" y1="182" x2="340" y2="206" stroke="#64748b" stroke-width="2.25" fill="none" marker-end="url(#m-gray)"/>

  <rect x="50" y="206" width="580" height="60" rx="8" ry="8" fill="#fafbfc" stroke="#1e3a5f" stroke-width="2"/>
  <text text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif">
    <tspan x="340" y="228" font-size="14" font-weight="600">Computer Science 2</tspan>
    <tspan x="340" y="250" font-size="11" font-weight="400" fill="#475569">VEX Robotics &amp; Computer Vision</tspan>
  </text>

  <line x1="340" y1="266" x2="340" y2="304" stroke="#64748b" stroke-width="2.25" fill="none" marker-end="url(#m-gray)"/>

  <text x="340" y="322" text-anchor="middle" fill="#0d9488" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="0.06em">AP Pathway</text>

  <!-- AP CSP: 3px stroke (core node); fill matches branch boxes -->
  <rect x="50" y="332" width="580" height="62" rx="8" ry="8" fill="#f0f9ff" stroke="#2563eb" stroke-width="3"/>
  <text x="340" y="358" text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="600">AP Computer Science Principles (AP CSP)</text>
  <text x="340" y="378" text-anchor="middle" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-weight="600" letter-spacing="0.06em">Core AP Entry Point</text>

  <line x1="340" y1="402" x2="340" y2="430" stroke="#2563eb" stroke-width="2.25" fill="none"/>
  <line x1="340" y1="430" x2="175" y2="430" stroke="#2563eb" stroke-width="2.25" fill="none"/>
  <line x1="340" y1="430" x2="505" y2="430" stroke="#2563eb" stroke-width="2.25" fill="none"/>
  <line x1="175" y1="430" x2="175" y2="446" stroke="#2563eb" stroke-width="2.25" fill="none" marker-end="url(#m-blue)"/>
  <line x1="505" y1="430" x2="505" y2="446" stroke="#2563eb" stroke-width="2.25" fill="none" marker-end="url(#m-blue)"/>

  <rect x="35" y="446" width="280" height="54" rx="8" ry="8" fill="#f0f9ff" stroke="#2563eb" stroke-width="2"/>
  <text x="175" y="478" text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600">AP Computer Science A (AP CSA)</text>

  <rect x="365" y="446" width="280" height="54" rx="8" ry="8" fill="#f0f9ff" stroke="#2563eb" stroke-width="2"/>
  <text x="505" y="478" text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600">AP Cybersecurity</text>

  <!-- Capstone: both AP options converge to center (pathway continuation, not CSA-only) -->
  <line x1="175" y1="500" x2="175" y2="518" stroke="#0d9488" stroke-width="2" fill="none"/>
  <line x1="175" y1="518" x2="340" y2="532" stroke="#0d9488" stroke-width="2" fill="none"/>
  <line x1="505" y1="500" x2="505" y2="518" stroke="#0d9488" stroke-width="2" fill="none"/>
  <line x1="505" y1="518" x2="340" y2="532" stroke="#0d9488" stroke-width="2" fill="none"/>
  <line x1="340" y1="532" x2="340" y2="558" stroke="#0d9488" stroke-width="2.25" fill="none" marker-end="url(#m-teal)"/>

  <text x="340" y="582" text-anchor="middle" fill="#0d9488" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="0.06em">Advanced Extension</text>

  <rect x="190" y="592" width="300" height="58" rx="8" ry="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="340" y="618" text-anchor="middle" fill="#1e293b" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600">
    <tspan x="340" dy="0">Artificial Intelligence</tspan>
    <tspan x="340" dy="16">Foundations</tspan>
  </text>

  <text x="340" y="674" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="10.5" font-style="italic">
    <tspan x="340" dy="0">Advanced extension for students with deeper</tspan>
    <tspan x="340" dy="15">computer science and artificial intelligence interest</tspan>
  </text>

  <line x1="40" y1="698" x2="640" y2="698" stroke="#cbd5e1" stroke-width="2"/>

  <rect x="36" y="712" width="608" height="188" rx="10" ry="10" fill="#eff6ff" stroke="#1e40af" stroke-width="2.5"/>

  <text x="340" y="738" text-anchor="middle" fill="#1e40af" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="0.04em">Pathway summary</text>

  <text x="340" y="762" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="600">
    <tspan x="340" dy="0">This pathway is designed as a clear progression from software to</tspan>
    <tspan x="340" dy="21">hardware, then into advanced AP and AI study. Students begin with</tspan>
    <tspan x="340" dy="21">full-stack web and AI application development, move into robotics</tspan>
    <tspan x="340" dy="21">and computer vision, and then enter AP Computer Science Principles</tspan>
    <tspan x="340" dy="21">as the core gateway to more specialized pathways. From there,</tspan>
    <tspan x="340" dy="21">students may continue into AP CSA, AP Cybersecurity, and ultimately</tspan>
    <tspan x="340" dy="21">AI Foundations as an advanced extension.</tspan>
  </text>
</svg>
